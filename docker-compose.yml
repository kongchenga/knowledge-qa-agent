version: "3.8"

services:
  knowledge-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowledge-agent
    ports:
      - "${PORT:-8020}:8020"
    volumes:
      - ./data:/app/data
      - ./knowledge:/app/knowledge
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL=${LLM_MODEL}
      - API_KEY=${API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8020/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

